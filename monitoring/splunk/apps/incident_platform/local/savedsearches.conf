[Incident Platform - Login Failure]
description = Detect invalid login failures from the platform log stream and create incidents.
search = index=main "Invalid login failed as expected" | sort - _time | head 1 | eval alertName="Splunk Invalid Login Failure", serviceName=coalesce(service_name, "log-generator-service"), severity=case(level="ERROR", "critical", level="WARN", "warning", true(), "warning"), status="OPEN", source="splunk", traceId=md5(coalesce(service_name, "") . ":" . coalesce(message, "") . ":" . coalesce('@timestamp', "")), statusCode=401, failureType="AUTH_LOGIN_FAILURE", errorMessage=message, startsAt='@timestamp' | eval rawLog=startsAt . " " . level . " service=" . serviceName . " traceId=" . traceId . " status=" . statusCode . " failure=" . failureType . " java.lang.IllegalStateException: " . errorMessage | table alertName serviceName severity status source rawLog traceId statusCode failureType errorMessage startsAt
disabled = 0
enableSched = 1
is_scheduled = 1
cron_schedule = */1 * * * *
dispatch.earliest_time = -1m@m
dispatch.latest_time = @m
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.digest_mode = 0
actions = webhook
action.webhook = 1
action.webhook.param.url = http://incident-service:8086/api/incidents/alerts
