global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: user-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8081

  - job_name: transaction-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - transaction-service:8082

  - job_name: payment-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - payment-service:8083

  - job_name: incident-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - incident-service:8086

  - job_name: log-generator-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - log-generator-service:8084

  - job_name: api-gateway
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
