server:
  port: 8080
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-route
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**
        - id: transaction-service-route
          uri: http://transaction-service:8082
          predicates:
            - Path=/api/transactions/**
        - id: payment-service-route
          uri: http://payment-service:8083
          predicates:
            - Path=/api/payments/**
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus