input {
  tcp {
    port => 5000
    codec => json
  }
}

filter {
  # Parse log_level to uppercase for consistent querying
  if [log_level] {
    mutate {
      uppercase => ["log_level"]
    }
  }

  # Add ingestion timestamp
  ruby {
    code => "event.set('ingested_at', Time.now.utc.iso8601)"
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "banking-logs-%{+YYYY.MM.dd}"
  }

  tcp {
    host => "splunk"
    port => 10514
    codec => json_lines
  }
}
