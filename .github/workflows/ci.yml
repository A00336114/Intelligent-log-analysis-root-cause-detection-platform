name: Banking CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

defaults:
  run:
    shell: bash

env:
  JAVA_VERSION: "21"
  PYTHON_VERSION: "3.11"
  DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-java:
    name: Build Java Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Print Java diagnostics
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          echo "JAVA_TOOL_OPTIONS=${JAVA_TOOL_OPTIONS:-<empty>}"
          echo "JDK_JAVA_OPTIONS=${JDK_JAVA_OPTIONS:-<empty>}"
          echo "_JAVA_OPTIONS=${_JAVA_OPTIONS:-<empty>}"
          echo "MAVEN_OPTS=${MAVEN_OPTS:-<empty>}"
          java -version
          mvn -version

      - name: Build common library
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          mvn -B clean install -DskipTests --file backend/common-library/pom.xml

      - name: Package Java services
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          for module in api-gateway user-service log-generator-service transaction-service payment-service incident-service; do
            mvn -B clean package -DskipTests --file "backend/${module}/pom.xml"
          done

  validate-python:
    name: Validate Python Log Parser
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: log-parser-service/requirements.txt

      - name: Install parser dependencies
        run: pip install -r log-parser-service/requirements.txt

      - name: Compile parser source
        run: python -m py_compile log-parser-service/app.py

  validate-ai-engine:
    name: Validate AI Engine
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: ai-engine/requirements.txt

      - name: Install AI engine dependencies
        run: pip install -r ai-engine/requirements.txt pytest

      - name: Compile AI engine source
        run: |
          python -m py_compile \
            ai-engine/app.py \
            ai-engine/api/FastAPI/anomaly_routes.py \
            ai-engine/api/FastAPI/schemas.py \
            ai-engine/anomaly_detection/inference/anomaly_detector.py \
            ai-engine/data_processing/log_fetcher.py \
            ai-engine/data_processing/anomaly_repository.py

      - name: Run AI engine tests
        run: pytest ai-engine/tests

  test-java:
    name: Run Java Tests
    runs-on: ubuntu-latest
    needs: build-java

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Install common library for dependent modules
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          mvn -B clean install -DskipTests --file backend/common-library/pom.xml

      - name: Run common library tests
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          mvn -B test --file backend/common-library/pom.xml

      - name: Run service tests
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          for module in api-gateway user-service log-generator-service transaction-service payment-service incident-service; do
            mvn -B test --file "backend/${module}/pom.xml"
          done

  docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - test-java
      - validate-python
      - validate-ai-engine
    if: github.event_name != 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Build common library
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          mvn -B clean install -DskipTests --file backend/common-library/pom.xml

      - name: Package Java services for Docker images
        run: |
          unset JAVA_TOOL_OPTIONS JDK_JAVA_OPTIONS _JAVA_OPTIONS MAVEN_OPTS
          for module in api-gateway user-service log-generator-service transaction-service payment-service incident-service; do
            mvn -B clean package -DskipTests --file "backend/${module}/pom.xml"
          done

      - name: Validate Docker Compose configuration
        run: docker compose config -q

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/api-gateway
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/api-gateway:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/api-gateway:${{ github.sha }}

      - name: Build and push user service image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/user-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/user-service:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/user-service:${{ github.sha }}

      - name: Build and push transaction service image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/transaction-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/transaction-service:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/transaction-service:${{ github.sha }}

      - name: Build and push payment service image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/payment-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/payment-service:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/payment-service:${{ github.sha }}

      - name: Build and push incident service image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/incident-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/incident-service:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/incident-service:${{ github.sha }}

      - name: Build and push log generator image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/log-generator-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/log-generator-service:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/log-generator-service:${{ github.sha }}

      - name: Build and push log parser image
        uses: docker/build-push-action@v6
        with:
          context: ./log-parser-service
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/log-parser-service:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/log-parser-service:${{ github.sha }}

      - name: Build and push AI engine image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-engine
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-engine:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/ai-engine:${{ github.sha }}

      - name: Build and push Splunk image
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/splunk
          push: true
          tags: |
            ${{ env.DOCKERHUB_NAMESPACE }}/incident-platform-splunk:latest
            ${{ env.DOCKERHUB_NAMESPACE }}/incident-platform-splunk:${{ github.sha }}
