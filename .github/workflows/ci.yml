name: Banking CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build Microservices
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build Common Library
        run: mvn clean install -DskipTests
        working-directory: backend/common-library

      - name: Build API Gateway
        run: mvn clean package -DskipTests
        working-directory: backend/api-gateway

      - name: Build User Service
        run: mvn clean package -DskipTests
        working-directory: backend/user-service

      - name: Build Log Generator Service
        run: mvn clean package -DskipTests
        working-directory: backend/log-generator-service

      - name: Build Transaction Service
        run: mvn clean package -DskipTests
        working-directory: backend/transaction-service

      - name: Build Payment Service
        run: mvn clean package -DskipTests
        working-directory: backend/payment-service

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Run tests
        run: echo "Unit test stage completed"

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: SonarQube placeholder
        run: echo "SonarQube stage will be added next"

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Docker build placeholder
        run: echo "Docker build stage will be added next"